<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GovTech Talent Scout - CFG</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

  <header class="border-b border-slate-800 bg-slate-950 p-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-2xl font-bold tracking-tight text-white">GovTech Talent Scout <span class="text-blue-500 text-sm font-medium px-2 py-1 bg-blue-950 rounded-md ml-2 border border-blue-800">CFG Sales Edition</span></h1>
      <button onclick="loadGovLeads()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-5 py-2 rounded-lg transition-colors text-sm">Scan Live Government Feeds</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6">
    <div class="flex gap-4 border-b border-slate-800 mb-6">
      <button onclick="switchTab('tenders')" id="tab-tenders" class="border-b-2 border-blue-500 text-white pb-3 font-semibold text-lg transition-all px-2">Live Tenders (Pre-Award)</button>
      <button onclick="switchTab('wins')" id="tab-wins" class="border-b-2 border-transparent text-slate-400 hover:text-slate-200 pb-3 font-semibold text-lg transition-all px-2">Contract Wins (Post-Award)</button>
    </div>

    <div id="loading" class="text-center py-12 text-slate-400 font-medium">Click "Scan Live Government Feeds" to begin searching...</div>
    
    <div id="table-container" class="hidden bg-slate-950 rounded-xl border border-slate-800 overflow-hidden shadow-xl">
      <table class="w-full text-left border-collapse">
        <thead class="bg-slate-900 text-slate-300 border-b border-slate-800 text-xs font-semibold uppercase tracking-wider select-none">
          <tr id="table-headers"></tr>
        </thead>
        <tbody id="table-body" class="divide-y divide-slate-800 text-sm text-slate-300"></tbody>
      </table>
    </div>
  </main>

  <div id="side-drawer" class="fixed top-0 right-0 h-full w-full max-w-lg bg-slate-950 border-l border-slate-800 shadow-2xl p-6 transform translate-x-full transition-transform duration-300 overflow-y-auto z-50">
    <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
      <h2 class="text-xl font-bold text-white">Sales Intel Briefing</h2>
      <button onclick="closeDrawer()" class="text-slate-400 hover:text-white font-bold text-lg">✕</button>
    </div>
    <div id="drawer-content" class="space-y-6"></div>
  </div>

  <script>
    let rawLeadsData = { liveTenders: [], contractWins: [] };
    let currentActiveTab = 'tenders';
    
    let sortDirections = { buyer: true, title: true, value: true, pathway: true, closingDate: true, suppliers: true, awardDate: true, year: false };

    async function loadGovLeads() {
      const loader = document.getElementById('loading');
      const container = document.getElementById('table-container');
      loader.innerText = "Querying Live Procurement Registry...";
      loader.classList.remove('hidden');
      container.classList.add('hidden');

      try {
        const res = await fetch('/api/scout');
        rawLeadsData = await res.json();
        loader.classList.add('hidden');
        container.classList.remove('hidden');
        renderDashboardTable();
      } catch (err) {
        loader.innerText = "Error syncing data feed.";
      }
    }

    function switchTab(targetTab) {
      currentActiveTab = targetTab;
      document.getElementById('tab-tenders').className = targetTab === 'tenders' ? "border-b-2 border-blue-500 text-white pb-3 font-semibold text-lg px-2" : "border-b-2 border-transparent text-slate-400 hover:text-slate-200 pb-3 font-semibold text-lg px-2";
      document.getElementById('tab-wins').className = targetTab === 'wins' ? "border-b-2 border-blue-500 text-white pb-3 font-semibold text-lg px-2" : "border-b-2 border-transparent text-slate-400 hover:text-slate-200 pb-3 font-semibold text-lg px-2";
      renderDashboardTable();
    }

    function sortColumn(field) {
      const isAscending = sortDirections[field];
      sortDirections[field] = !isAscending; 
      const targetDataset = currentActiveTab === 'tenders' ? rawLeadsData.liveTenders : rawLeadsData.contractWins;

      targetDataset.sort((a, b) => {
        let valA = a[field];
        let valB = b[field];
        if (field === 'value') {
          valA = parseInt(String(valA).replace(/[£,]/g, '')) || 0;
          valB = parseInt(String(valB).replace(/[£,]/g, '')) || 0;
        }
        if (valA < valB) return isAscending ? -1 : 1;
        if (valA > valB) return isAscending ? 1 : -1;
        return 0;
      });
      renderDashboardTable();
    }

    function renderDashboardTable() {
      const headers = document.getElementById('table-headers');
      const body = document.getElementById('table-body');
      body.innerHTML = "";

      if (currentActiveTab === 'tenders') {
        headers.innerHTML = `
          <th onclick="sortColumn('year')" class="p-4 cursor-pointer hover:bg-slate-800 text-blue-400 font-bold">Year ↕</th>
          <th onclick="sortColumn('buyer')" class="p-4 cursor-pointer hover:bg-slate-800">Buyer Dept ↕</th>
          <th onclick="sortColumn('title')" class="p-4 cursor-pointer hover:bg-slate-800">Project Scope ↕</th>
          <th onclick="sortColumn('value')" class="p-4 cursor-pointer hover:bg-slate-800">Value ↕</th>
          <th onclick="sortColumn('pathway')" class="p-4 cursor-pointer hover:bg-slate-800">CFG Track ↕</th>`;
        
        rawLeadsData.liveTenders.forEach((item, index) => {
          body.innerHTML += `<tr onclick="openDrawer('tenders', ${index})" class="hover:bg-slate-900 cursor-pointer border-b border-slate-800/50">
            <td class="p-4 font-bold text-blue-400">${item.year}</td>
            <td class="p-4 font-semibold text-white truncate max-w-[180px]">${item.buyer}</td>
            <td class="p-4 max-w-xs truncate">${item.title}</td>
            <td class="p-4 text-emerald-400 font-medium">${item.value}</td>
            <td class="p-4"><span class="px-2.5 py-1 rounded-full text-xs font-medium bg-blue-950 text-blue-400 border border-blue-900">${item.pathway}</span></td>
          </tr>`;
        });
      } else {
        headers.innerHTML = `
          <th onclick="sortColumn('year')" class="p-4 cursor-pointer hover:bg-slate-800 text-blue-400 font-bold">Year ↕</th>
          <th onclick="sortColumn('buyer')" class="p-4 cursor-pointer hover:bg-slate-800">Buyer Dept ↕</th>
          <th onclick="sortColumn('title')" class="p-4 cursor-pointer hover:bg-slate-800">Project Title ↕</th>
          <th onclick="sortColumn('value')" class="p-4 cursor-pointer hover:bg-slate-800">Value ↕</th>
          <th onclick="sortColumn('suppliers')" class="p-4 cursor-pointer hover:bg-slate-800">Winning Supplier ↕</th>`;
        
        rawLeadsData.contractWins.forEach((item, index) => {
          body.innerHTML += `<tr onclick="openDrawer('wins', ${index})" class="hover:bg-slate-900 cursor-pointer border-b border-slate-800/50">
            <td class="p-4 font-bold text-blue-400">${item.year}</td>
            <td class="p-4 font-semibold text-white truncate max-w-[180px]">${item.buyer}</td>
            <td class="p-4 max-w-xs truncate">${item.title}</td>
            <td class="p-4 text-emerald-400 font-medium">${item.value}</td>
            <td class="p-4 text-slate-200 truncate max-w-[140px]">${item.suppliers[0] || "Assigned Contractor"}</td>
          </tr>`;
        });
      }
    }

    function openDrawer(type, index) {
      const item = type === 'tenders' ? rawLeadsData.liveTenders[index] : rawLeadsData.contractWins[index];
      const drawer = document.getElementById('side-drawer');
      const content = document.getElementById('drawer-content');
      
      // UN-CRASHABLE ROUTER LINK: Direct open search string into the real official Gov portal search interface
      const robustVerificationSearchUrl = `https://www.contractsfinder.service.gov.uk/Search/Results?text=${item.searchQuery}`;

      content.innerHTML = `
        <div class="bg-blue-950/40 border border-blue-900 rounded-lg p-3 flex justify-between items-center mb-4">
          <div>
            <div class="text-xs font-bold text-blue-400 uppercase tracking-wide">canonical record lookup</div>
            <div class="text-[11px] text-slate-400">Database Pipeline Origin Year: **${item.year}**</div>
          </div>
          <a href="${robustVerificationSearchUrl}" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold px-4 py-2 rounded transition-colors flex items-center gap-1 shadow-md">
            Verify on Gov.uk ↗
          </a>
        </div>

        <div>
          <h3 class="text-lg font-bold text-white mb-1">${item.title}</h3>
          <p class="text-xs text-slate-400">Client: ${item.buyer} | Value: <span class="text-emerald-400 font-medium">${item.value}</span></p>
        </div>
        <div class="bg-slate-900/60 border border-slate-800 rounded-lg p-4 text-xs max-h-40 overflow-y-auto text-slate-400 leading-relaxed">${item.description}</div>
        <div>
          <h4 class="text-xs uppercase tracking-wider text-slate-400 font-semibold mb-1">CFG Graduate Pathway Match</h4>
          <span class="px-3 py-1 rounded-full text-xs font-semibold bg-blue-950 text-blue-400 border border-blue-900">${item.pathway}</span>
        </div>
      `;
      drawer.classList.remove('translate-x-full');
    }

    function closeDrawer() {
      document.getElementById('side-drawer').classList.add('translate-x-full');
    }
  </script>
</body>
</html>
